[env:lilygo-t-watch]
board = lilygo-t-watch
board_build.partitions = custom_16Mb.csv
build_src_filter =${env.build_src_filter} +<../boards/lilygo-t-watch>
build_flags =
	${env.build_flags}
	-Iboards/lilygo-t-watch
	-Os
	-DCORE_DEBUG_LEVEL=1

	-D REMOVE_RFID_HW_INTERFACE # Remove hardware interface due to limited GPIO

	;Features Enabled
	-DMIC_SPM1423=1
	-DPIN_CLK=44
	-DI2S_SCLK_PIN=44
	-DI2S_DATA_PIN=47
	-DPIN_DATA=47

	;Battery ADC read pin
	-DBAT_PIN=34

	;Buttons configuration
	-DHAS_BTN=1
	-DBTN_ALIAS='"Mid"'
	-DBTN_PIN=36
	-DBTN_ACT=LOW

	;Infrared Led default pins
	-DIR_TX_PINS='{{"IO 13", 13}}'
	-DIR_RX_PINS='{{"IO 15", 15}}'
	-DTXLED=13
	-DRXLED=15
	-DLED_ON=HIGH
	-DLED_OFF=LOW

	;Radio Frequency (single pin modules)
	-DRF_TX_PINS='{{"IO 2", 2}}'
	-DRF_RX_PINS='{{"IO 14", 14}}'

	;CC1101 SPI connection pins
	-DUSE_CC1101_VIA_SPI
	-DCC1101_GDO0_PIN=39
	-DCC1101_SS_PIN=32
	-DCC1101_MOSI_PIN=SPI_MOSI_PIN
	-DCC1101_SCK_PIN=SPI_SCK_PIN
	-DCC1101_MISO_PIN=SPI_MISO_PIN

	;NRF24 SPI connection pins
	-DUSE_NRF24_VIA_SPI
	-DNRF24_CE_PIN=37
	-DNRF24_SS_PIN=38
	-DNRF24_MOSI_PIN=SPI_MOSI_PIN
	-DNRF24_SCK_PIN=SPI_SCK_PIN
	-DNRF24_MISO_PIN=SPI_MISO_PIN

	;-DUSE_W5500_VIA_SPI
	-DW5500_SS_PIN=-1
	-DW5500_MOSI_PIN=SPI_MOSI_PIN
	-DW5500_SCK_PIN=SPI_SCK_PIN
	-DW5500_MISO_PIN=SPI_MISO_PIN
	-DW5500_INT_PIN=-1

	;Serial (GPS)
	-DSERIAL_TX=33
	-DSERIAL_RX=34
	-DGPS_SERIAL_TX=SERIAL_TX
	-DGPS_SERIAL_RX=SERIAL_RX

	;RTC
	-DHAS_RTC=1

	;Screen Setup
	-DHAS_SCREEN=1
	-DROTATION=2
	-DMINBRIGHT=1

	;TFT_eSPI display settings
	-DUSER_SETUP_LOADED=1
	-DST7789_DRIVER=1
	-DTFT_WIDTH=240
	-DTFT_HEIGHT=240
	-DTFT_INVERSION_ON
	-DTFT_BL=12
	-DTFT_MISO=-1
	-DTFT_MOSI=19
	-DTFT_SCLK=18
	-DTFT_CS=5
	-DTFT_DC=27
	-DTFT_RST=-1

	-DHAS_TOUCH=1

	-DSMOOTH_FONT=1
	-DSPI_FREQUENCY=40000000
	-DSPI_READ_FREQUENCY=20000000

	;SD Card (backplane)
	-DSDCARD_CS=13
	-DSDCARD_SCK=14
	-DSDCARD_MISO=2
	-DSDCARD_MOSI=15

	;Default I2C port (sensors)
	-DGROVE_SDA=21
	-DGROVE_SCL=22

	-DSPI_SCK_PIN=14
	-DSPI_MOSI_PIN=15
	-DSPI_MISO_PIN=2
	-DSPI_SS_PIN=33

	-DDEVICE_NAME='"Lilygo TTGO T-Watch"'

lib_deps =
	${env.lib_deps}
	lewisxhe/XPowersLib @0.2.7
	lewisxhe/SensorLib@0.3.4